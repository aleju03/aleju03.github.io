<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf8f0" />
    <!-- Clash is still the site's display face; Optimer is the default hero
         3D typeface. Preloading both keeps first paint and the assembled name
         from waiting on late font fetches. -->
    <link
      rel="preload"
      href="/fonts/clash-display-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/optimer_bold.typeface.json" as="fetch" />
    <meta
      name="description"
      content="Alejandro Jiménez is a full-stack developer from Costa Rica building web apps end to end."
    />
    <title>Alejandro Jiménez - Software Engineer</title>
    <script>
      // set theme before first paint to avoid a flash of the wrong mode
      const stored = localStorage.getItem('theme')
      const dark =
        stored === 'dark' ||
        (stored !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.classList.toggle('dark', dark)
      document
        .querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', dark ? '#1d1913' : '#faf8f0')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
