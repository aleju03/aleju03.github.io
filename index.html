<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafaf9" />
    <!-- the hero name needs both Clash faces ASAP: the woff2 for the static
         fallback, the typeface JSON for the 3D blocks. Preload kills the
         Geist->Clash flash and gets the assembled name on screen sooner. -->
    <link
      rel="preload"
      href="/fonts/clash-display-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/clash-display-semibold.typeface.json" as="fetch" />
    <meta
      name="description"
      content="Alejandro Jiménez is a full-stack developer from Costa Rica building web apps end to end."
    />
    <title>Alejandro Jiménez, Full-Stack Developer</title>
    <script>
      // set theme before first paint to avoid a flash of the wrong mode
      const stored = localStorage.getItem('theme')
      const dark =
        stored === 'dark' ||
        (stored !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.classList.toggle('dark', dark)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
